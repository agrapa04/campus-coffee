spring:
  application:
    name: campus-coffee
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: true
    hibernate:
      # Flyway owns the schema; Hibernate only validates that the entities match it at startup.
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
  web:
    error:
      whitelabel:
        enabled: false
logging:
  file:
    name: campus-coffee.log
  level:
    de.seuhd.campuscoffee.data.client: DEBUG
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
# Custom properties; documented in their @ConfigurationProperties classes (OsmApiProperties, IdProperties,
# PersistenceProperties, ApprovalProperties, JwtProperties, FixturesProperties), not here.
campus-coffee:
  osm:
    api:
      base-url: https://www.openstreetmap.org/api/0.6
  id:
    entity-seed: ${CAMPUS_COFFEE_ID_ENTITY_SEED:42}
    event-seed: ${CAMPUS_COFFEE_ID_EVENT_SEED:100}
  persistence:
    mode: ${CAMPUS_COFFEE_PERSISTENCE_MODE:event-sourcing}
    data-to-events-on-startup: ${CAMPUS_COFFEE_DATA_TO_EVENTS_ON_STARTUP:false}
    events-to-data-on-startup: ${CAMPUS_COFFEE_EVENTS_TO_DATA_ON_STARTUP:false}
  approval:
    min-count: 3
  jwt:
    # No in-source fallback: the base config (which the prod profile and a no-profile run both inherit)
    # requires JWT_SECRET, so a deployment cannot accidentally sign and verify tokens with a committed
    # secret. The dev profile supplies an insecure local fallback below; the test suite injects its own
    # secret via a system property (see application/build.gradle.kts).
    secret: ${JWT_SECRET}
  fixtures:
    load-on-startup: false

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
  web:
    error:
      include-message: always
      include-binding-errors: always
management: # https://docs.spring.io/spring-boot/reference/actuator/endpoints.html
  # Exposing an endpoint only makes it reachable; the access rules live in SecurityConfig.
  endpoints:
    web:
      exposure:
        include: health, metrics, env
  metrics:
    enable:
      all: true
springdoc:
  api-docs:
    enabled: true
    path: /api/api-docs
  swagger-ui:
    enabled: true
    path: /api/swagger-ui.html
campus-coffee:
  jwt:
    # A fixed, insecure secret for local development only (the dev profile is never deployed). No env-var
    # indirection: the base config requires JWT_SECRET with no default, so prod and no-profile runs fail
    # fast when it is unset and are unaffected by this dev value.
    secret: dev-only-insecure-jwt-secret-change-me-in-production
  fixtures:
    load-on-startup: true

---
spring:
  config:
    activate:
      on-profile: prod
campus-coffee:
  # The JWT secret is inherited from the base config (required, no fallback), so prod fails fast without it.
  fixtures:
    # Off by default: seeding the demo fixtures creates accounts whose passwords are committed in the repo
    # (a known-credentials login). Opt in only for a throwaway demo by setting LOAD_FIXTURES_ON_STARTUP=true.
    load-on-startup: ${LOAD_FIXTURES_ON_STARTUP:false}
management:
  # env is not exposed in prod: even with sensitive values masked it reveals the configuration
  # structure and property-source names.
  endpoints:
    web:
      exposure:
        include: health, metrics
